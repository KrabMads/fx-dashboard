<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arla FX Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
:root{
  --bg:#0c0c0f;--surface:#111116;--surface2:#16161c;
  --border:#222228;--border2:#2a2a32;
  --text:#f0f0f5;--muted:#555560;--subtle:#38383f;
  --axis-x:#7dd3fc;       /* sky blue for x-axis dates */
  --axis-y:#a78bfa;       /* violet for y-axis prices */
  --grid-line:#1a1a28;
  --axis-border:#2a2a3a;
  --up:#22c55e;--down:#ef4444;--accent:#6366f1;
  --ma100:#f59e0b;--ma200:#38bdf8;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif}
body{display:flex;flex-direction:column}

header{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:48px;background:var(--surface);border-bottom:1px solid var(--border)}
.brand{font-size:17px;font-weight:700;letter-spacing:-.02em}
.brand span{font-weight:300;color:var(--muted);font-size:12px;margin-left:8px;letter-spacing:.05em}
.hdr-right{display:flex;align-items:center;gap:16px}
.live-badge{display:flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--border2);border-radius:20px;padding:3px 10px;font-size:11px;font-weight:500;color:var(--muted)}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--up);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
#clock{font-size:13px;font-weight:500;color:var(--text);font-variant-numeric:tabular-nums}

.controls{flex-shrink:0;display:flex;align-items:center;gap:6px;padding:5px 16px;background:var(--surface);border-bottom:1px solid var(--border);flex-wrap:wrap}
.ctrl-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-right:2px;white-space:nowrap}
.ctrl-sep{width:1px;height:18px;background:var(--border2);margin:0 8px;flex-shrink:0}
.btn-grp{display:flex;gap:2px}
.btn{font-family:'Inter',sans-serif;font-size:10px;font-weight:600;padding:3px 10px;border-radius:5px;border:1px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;letter-spacing:.04em;text-transform:uppercase;transition:all .12s;white-space:nowrap}
.btn:hover{color:var(--text);border-color:var(--subtle)}
.btn.active{background:var(--accent);border-color:var(--accent);color:#fff}

.grid-wrap{flex:1;min-height:0;display:grid;gap:1px;background:var(--border)}

.cell{background:var(--surface);display:flex;flex-direction:column;padding:10px 12px 6px;position:relative;overflow:hidden;min-height:0}
.cell-top{flex-shrink:0;display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:4px}
.pair-name{font-size:12px;font-weight:700;letter-spacing:.04em;color:var(--text)}
.pair-sub{font-size:9px;font-weight:500;color:var(--muted);margin-top:2px;letter-spacing:.06em;text-transform:uppercase}
.pblock{text-align:right;flex-shrink:0}
.price{font-size:15px;font-weight:600;color:var(--text);font-variant-numeric:tabular-nums}
.chg{font-size:10px;font-weight:500;margin-top:2px;font-variant-numeric:tabular-nums;color:var(--muted)}
.chg.up{color:var(--up)}.chg.down{color:var(--down)}

.cwrap{flex:1;min-height:0;position:relative}
.cwrap canvas{width:100%!important;height:100%!important;display:block}

.chart-btns{position:absolute;top:4px;right:48px;display:flex;gap:3px;z-index:10}
.ma-btn{font-family:'Inter',sans-serif;font-size:8px;font-weight:700;padding:2px 5px;border-radius:4px;cursor:pointer;border:1px solid var(--border2);background:rgba(17,17,22,.88);color:var(--muted);letter-spacing:.04em;transition:all .12s;backdrop-filter:blur(4px)}
.ma-btn:hover{color:var(--text);border-color:var(--subtle)}
.ma-btn.active-100{background:rgba(245,158,11,.15);border-color:var(--ma100);color:var(--ma100)}
.ma-btn.active-200{background:rgba(56,189,248,.15);border-color:var(--ma200);color:var(--ma200)}
.reset-btn{font-family:'Inter',sans-serif;font-size:8px;font-weight:700;padding:2px 5px;border-radius:4px;cursor:pointer;border:1px solid var(--border2);background:rgba(17,17,22,.88);color:var(--muted);letter-spacing:.04em;transition:all .12s;backdrop-filter:blur(4px);display:none}
.reset-btn.visible{display:block}
.reset-btn:hover{color:var(--text);border-color:var(--subtle)}

.cell-controls{flex-shrink:0;display:flex;align-items:center;gap:3px;margin-top:4px;flex-wrap:wrap}
.cell-sel{font-family:'Inter',sans-serif;font-size:9px;font-weight:600;background:var(--surface2);border:1px solid var(--border2);color:var(--muted);border-radius:4px;padding:2px 4px;cursor:pointer;text-transform:uppercase;letter-spacing:.04em;appearance:none;-webkit-appearance:none}
.cell-sel:focus{outline:none;border-color:var(--accent)}
.cell-btn{font-family:'Inter',sans-serif;font-size:9px;font-weight:600;padding:2px 6px;border-radius:4px;border:1px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;letter-spacing:.04em;text-transform:uppercase;transition:all .12s}
.cell-btn:hover{color:var(--text);border-color:var(--subtle)}
.cell-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.cell-sep{width:1px;height:12px;background:var(--border2);margin:0 2px;flex-shrink:0}

.overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(12,12,15,.93);gap:8px;padding:12px;text-align:center}
.overlay.gone{display:none}
.spin{width:18px;height:18px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ov-lbl{font-size:10px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}
.ov-err{font-size:9px;color:var(--down);max-width:160px;line-height:1.6}

footer{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:28px;background:var(--surface);border-top:1px solid var(--border);font-size:10px;color:var(--muted)}
.leg{display:flex;gap:12px}
.leg span{display:flex;align-items:center;gap:4px;font-weight:500}
.lb{width:8px;height:8px;border-radius:2px}
.lb.up{background:var(--up)}.lb.down{background:var(--down)}
.lb.ma100{background:var(--ma100);border-radius:50%}
.lb.ma200{background:var(--ma200);border-radius:50%}
</style>
</head>
<body>

<header>
  <div class="brand">Arla <span>FX MONITOR</span></div>
  <div class="hdr-right">
    <div class="live-badge"><div class="live-dot"></div><span id="cd">10:00</span></div>
    <div id="clock">--:--:--</div>
  </div>
</header>

<div class="controls">
  <span class="ctrl-label">Grid size</span>
  <div class="btn-grp" id="grid-size-btns">
    <button class="btn" data-size="2">2×2</button>
    <button class="btn active" data-size="3">3×2</button>
    <button class="btn" data-size="4">4×2</button>
    <button class="btn" data-size="6">6×2</button>
  </div>
</div>

<div class="grid-wrap" id="grid"></div>

<footer>
  <div class="leg">
    <span><div class="lb up"></div>Bullish</span>
    <span><div class="lb down"></div>Bearish</span>
    <span><div class="lb ma100"></div>MA 100</span>
    <span><div class="lb ma200"></div>MA 200</span>
  </div>
  <div id="data-ts">Yahoo Finance · Updated every 10 min</div>
</footer>

<script>
const ALL_PAIRS=[
  {id:'EURDKK',label:'EUR/DKK'},
  {id:'GBPDKK',label:'GBP/DKK'},
  {id:'USDDKK',label:'USD/DKK'},
  {id:'SEKDKK',label:'SEK/DKK'},
  {id:'AUDDKK',label:'AUD/DKK'},
  {id:'CADDKK',label:'CAD/DKK'},
];
const DEFAULT_PAIRS={
  2:['EURDKK','USDDKK','SEKDKK','GBPDKK'],
  3:['EURDKK','USDDKK','SEKDKK','GBPDKK','AUDDKK','CADDKK'],
  4:['EURDKK','USDDKK','SEKDKK','GBPDKK','AUDDKK','CADDKK','EURDKK','USDDKK'],
  6:['EURDKK','GBPDKK','USDDKK','SEKDKK','AUDDKK','CADDKK','EURDKK','GBPDKK','USDDKK','SEKDKK','AUDDKK','CADDKK'],
};

const REFRESH_SEC=600;
const rawData={};
const charts={};
let countdown=REFRESH_SEC;
let gridCols=3;
let cellSettings=[];

// ── X-axis config based on range ──────────────────────────────────────────────
// Returns Chart.js time scale options + a custom tick callback for two-line labels
function xAxisConfig(rangeMonths) {
  // For short ranges show days, for long ranges show months/years
  if (rangeMonths <= 1) {
    // 1 month: show every day. Top = "Apr 26", but only print month on first of month
    return {
      unit: 'day',
      maxTicksLimit: 35,
      displayFormats: { day: 'd' },   // we'll override with callback
      tooltipFormat: 'dd MMM yyyy',
      twoLine: true,   // custom flag
    };
  } else if (rangeMonths <= 3) {
    // 3 months: show every ~3 days
    return {
      unit: 'day',
      maxTicksLimit: 20,
      displayFormats: { day: 'd' },
      tooltipFormat: 'dd MMM yyyy',
      twoLine: true,
    };
  } else if (rangeMonths <= 6) {
    return {
      unit: 'week',
      maxTicksLimit: 14,
      displayFormats: { week: 'd MMM' },
      tooltipFormat: 'dd MMM yyyy',
      twoLine: false,
    };
  } else if (rangeMonths <= 18) {
    return {
      unit: 'month',
      maxTicksLimit: 14,
      displayFormats: { month: 'MMM yy' },
      tooltipFormat: 'dd MMM yyyy',
      twoLine: false,
    };
  } else {
    return {
      unit: 'month',
      maxTicksLimit: 10,
      displayFormats: { month: 'MMM yy' },
      tooltipFormat: 'dd MMM yyyy',
      twoLine: false,
    };
  }
}

// ── MA helper ─────────────────────────────────────────────────────────────────
// MA is calculated on the candles array — so MA100 means
// 100 candles of whatever timeframe is selected (daily/weekly/monthly)
function calcMA(candles,period){
  const result=[];
  for(let i=0;i<candles.length;i++){
    if(i<period-1)continue;
    let sum=0;
    for(let j=i-period+1;j<=i;j++)sum+=candles[j].c;
    result.push({x:candles[i].x, y:sum/period});
  }
  return result;
}

// ── Candlestick plugin ────────────────────────────────────────────────────────
Chart.register({
  id:'candles',
  afterDatasetsDraw(chart){
    const ctx=chart.ctx,ds=chart.data.datasets[0],meta=chart.getDatasetMeta(0),yS=chart.scales.y;
    if(!meta?.data?.length)return;
    ds.data.forEach((d,i)=>{
      const bar=meta.data[i];if(!bar||!d)return;
      const isUp=d.c>=d.o,col=isUp?'#22c55e':'#ef4444',x=bar.x;
      const yO=yS.getPixelForValue(d.o),yC=yS.getPixelForValue(d.c);
      const yH=yS.getPixelForValue(d.h),yL=yS.getPixelForValue(d.l);
      const top=Math.min(yO,yC),bot=Math.max(yO,yC),bh=Math.max(bot-top,2.5),hw=Math.max((bar.width||6)/2,2);
      ctx.save();ctx.strokeStyle=col;ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(x,yH);ctx.lineTo(x,top);ctx.moveTo(x,bot);ctx.lineTo(x,yL);ctx.stroke();
      if(isUp){ctx.strokeRect(x-hw,top,hw*2,bh);ctx.globalAlpha=.18;ctx.fillStyle=col;ctx.fillRect(x-hw,top,hw*2,bh);}
      else{ctx.fillStyle=col;ctx.fillRect(x-hw,top,hw*2,bh);}
      ctx.restore();
    });
  }
});

// ── Two-line x-axis plugin ────────────────────────────────────────────────────
// Draws day number, and prints "MMM" above only when month changes
Chart.register({
  id:'twoLineX',
  afterDraw(chart){
    if(!chart._twoLineX) return;
    const ctx=chart.ctx, xScale=chart.scales.x;
    if(!xScale) return;

    const ticks=xScale.ticks;
    if(!ticks||!ticks.length) return;

    let lastMonth=-1;
    const bottom=xScale.bottom;
    const axisColor='#7dd3fc';

    ctx.save();
    ctx.font='500 9px Inter, sans-serif';
    ctx.textAlign='center';

    ticks.forEach(tick=>{
      const d=new Date(tick.value);
      const x=xScale.getPixelForValue(tick.value);
      const day=d.getDate();
      const month=d.getMonth();

      // Day number on bottom row
      ctx.fillStyle=axisColor;
      ctx.fillText(String(day), x, bottom+12);

      // Month label on top row — only when month changes
      if(month!==lastMonth){
        const monthStr=d.toLocaleDateString('en-GB',{month:'short'});
        ctx.fillStyle='#bae6fd'; // slightly brighter for month
        ctx.font='600 9px Inter, sans-serif';
        ctx.fillText(monthStr, x, bottom+23);
        ctx.font='500 9px Inter, sans-serif';
        lastMonth=month;
      }
    });
    ctx.restore();
  }
});

// ── Data helpers ──────────────────────────────────────────────────────────────
function parseYahoo(json){
  const r=json.chart.result[0];
  const q=r.indicators.quote[0];
  // Yahoo timestamps are in exchange local timezone (gmtoffset seconds).
  // Apply offset so dates match what Yahoo Finance website shows.
  const gmtOffset=(r.meta.gmtoffset||0)*1000;

  const raw=r.timestamp.map((t,i)=>({
    ts:t*1000+gmtOffset,
    h:q.high[i],
    l:q.low[i],
    c:q.close[i],
  })).filter(d=>d.h!=null&&d.l!=null&&d.c!=null);

  // Synthetic open: previous day close = today open.
  // FX never truly closes so this is the correct approach.
  // Yahoo open values are unreliable for FX pairs.
  return raw.map((d,i)=>({
    ts:d.ts,
    h:d.h,
    l:d.l,
    c:d.c,
    o:i===0?d.c:raw[i-1].c,
  }));
}

function toCandles(daily,nDays){
  if(nDays<=1) return daily.map(d=>({x:d.ts,o:d.o,h:d.h,l:d.l,c:d.c}));
  const buckets={};
  daily.forEach(d=>{
    const slot=Math.floor(d.ts/(nDays*86400000))*(nDays*86400000);
    if(!buckets[slot])buckets[slot]=[];buckets[slot].push(d);
  });
  return Object.keys(buckets).sort((a,b)=>a-b).map(slot=>{
    const days=buckets[slot];
    return{x:+slot,o:days[0].o,h:Math.max(...days.map(d=>d.h)),l:Math.min(...days.map(d=>d.l)),c:days[days.length-1].c};
  });
}

function trimMonths(candles,months){
  const cut=new Date();cut.setMonth(cut.getMonth()-months);
  return candles.filter(c=>c.x>=cut.getTime());
}
function trimMA(pts,months){
  const cut=new Date();cut.setMonth(cut.getMonth()-months);
  return pts.filter(p=>p.x>=cut.getTime());
}

// ── Chart ─────────────────────────────────────────────────────────────────────
function destroyChart(key){if(charts[key]){charts[key].destroy();delete charts[key];}}

function applyChart(key,candles,ma100Pts,ma200Pts,rangeMonths){
  const canvas=document.getElementById(`cv-${key}`);if(!canvas)return;
  const minY=Math.min(...candles.map(c=>c.l));
  const maxY=Math.max(...candles.map(c=>c.h));
  const pad=Math.max((maxY-minY)*0.08,0.005);

  const xCfg=xAxisConfig(rangeMonths);
  const twoLine=xCfg.twoLine;

  const datasets=[{
    data:candles,backgroundColor:'transparent',borderColor:'transparent',
    barPercentage:0.9,categoryPercentage:0.9,order:2,
  }];
  if(ma100Pts?.length)datasets.push({type:'line',data:ma100Pts,parsing:false,borderColor:'#f59e0b',borderWidth:1.5,pointRadius:0,tension:0.3,order:1,label:'MA100'});
  if(ma200Pts?.length)datasets.push({type:'line',data:ma200Pts,parsing:false,borderColor:'#38bdf8',borderWidth:1.5,pointRadius:0,tension:0.3,order:0,label:'MA200'});

  const options={
    responsive:true,maintainAspectRatio:false,animation:false,parsing:false,
    layout:{padding:{top:4,bottom: twoLine?14:2,left:0,right:4}},
    scales:{
      x:{
        type:'time',
        offset: true,
        time:{
          unit: xCfg.unit,
          displayFormats: xCfg.displayFormats,
          tooltipFormat: xCfg.tooltipFormat,
        },
        grid:{color:'#1a1a28'},border:{color:'#2a2a3a'},
        ticks:{
          color: twoLine ? 'transparent' : '#7dd3fc',
          font:{family:'Inter',size:10,weight:'500'},
          maxRotation:0,
          maxTicksLimit: xCfg.maxTicksLimit,
        },
      },
      y:{
        position:'right',min:minY-pad,max:maxY+pad,
        grid:{color:'#1a1a28'},border:{color:'#2a2a3a'},
        ticks:{
          color:'#a78bfa',   // violet for prices
          font:{family:'Inter',size:10,weight:'500'},
          maxTicksLimit:12,
          callback:v=>v.toFixed(2),
        }
      }
    },
    plugins:{
      legend:{display:false},
      twoLineX: twoLine,   // consumed by our custom plugin via chart._twoLineX
      zoom:{
        zoom:{
          drag:{enabled:true,axis:'y',backgroundColor:'rgba(99,102,241,0.08)',borderColor:'rgba(99,102,241,0.4)',borderWidth:1},
          mode:'y',
          onZoomComplete({chart}){
            const k=chart.canvas.id.replace('cv-','');
            const rb=document.getElementById(`reset-${k}`);if(rb)rb.classList.add('visible');
          }
        },
        limits:{y:{min:'original',max:'original'}},
      },
      tooltip:{
        backgroundColor:'#111116',borderColor:'#222228',borderWidth:1,
        titleColor:'#f0f0f5',bodyColor:'#a0a0b8',
        titleFont:{family:'Inter',size:11,weight:'600'},bodyFont:{family:'Inter',size:10},
        callbacks:{
          label:ctx=>{
            if(ctx.dataset.label==='MA100')return`MA100: ${ctx.parsed.y.toFixed(4)}`;
            if(ctx.dataset.label==='MA200')return`MA200: ${ctx.parsed.y.toFixed(4)}`;
            const d=ctx.raw;return[`O: ${d.o.toFixed(4)}`,`H: ${d.h.toFixed(4)}`,`L: ${d.l.toFixed(4)}`,`C: ${d.c.toFixed(4)}`];
          }
        }
      }
    }
  };

  if(charts[key]){
    charts[key]._twoLineX=twoLine;
    charts[key].data.datasets=datasets;
    charts[key].options=options;
    charts[key].update('none');
    return;
  }

  const ch=new Chart(canvas.getContext('2d'),{type:'bar',data:{datasets},options});
  ch._twoLineX=twoLine;
  charts[key]=ch;
}

// ── Render cell ───────────────────────────────────────────────────────────────
function renderCell(idx){
  const s=cellSettings[idx];if(!s)return;
  const key=`cell-${idx}`;
  const pair=ALL_PAIRS.find(p=>p.id===s.pairId)||ALL_PAIRS[0];
  const nameEl=document.getElementById(`name-${key}`);if(nameEl)nameEl.textContent=pair.label;
  const rl=s.range<12?`${s.range}M`:`${Math.round(s.range/12)}Y`;
  const cl=s.candle<=1?'Daily':s.candle<=7?'Weekly':'Monthly';
  const subEl=document.getElementById(`sub-${key}`);if(subEl)subEl.textContent=`${rl} · ${cl}`;

  const daily=rawData[s.pairId];if(!daily)return;
  try{
    const candles=trimMonths(toCandles(daily,s.candle),s.range);
    if(!candles.length)throw new Error('No data in this range');
    const last=candles[candles.length-1],prev=candles.length>1?candles[candles.length-2]:null;
    const priceEl=document.getElementById(`price-${key}`);if(priceEl)priceEl.textContent=last.c.toFixed(4);
    if(prev){
      const el=document.getElementById(`chg-${key}`);
      const d=last.c-prev.c,pct=(d/prev.c*100).toFixed(2),sg=d>=0?'+':'';
      if(el){el.textContent=`${sg}${d.toFixed(4)}  (${sg}${pct}%)`;el.className=`chg ${d>=0?'up':'down'}`;}
    }
    // MA calculated on candles — matches selected timeframe (D/W/M)
    const ma100=s.ma100?calcMA(candles,100):null;
    const ma200=s.ma200?calcMA(candles,200):null;
    applyChart(key,candles,ma100,ma200,s.range);
    const ov=document.getElementById(`ov-${key}`);if(ov)ov.classList.add('gone');
  }catch(e){
    const ov=document.getElementById(`ov-${key}`);
    if(ov){ov.innerHTML=`<div style="font-size:16px">⚠️</div><div class="ov-err">${e.message}</div>`;ov.classList.remove('gone');}
  }
}

// ── Build grid ────────────────────────────────────────────────────────────────
function buildGrid(cols){
  Object.keys(charts).forEach(k=>destroyChart(k));
  const total=cols*2;
  const layout=DEFAULT_PAIRS[cols]||DEFAULT_PAIRS[3];
  cellSettings=Array.from({length:total},(_,i)=>({
    pairId:layout[i%layout.length]||ALL_PAIRS[0].id,
    range:i<cols?36:3,candle:i<cols?7:1,ma100:false,ma200:false,
  }));

  const grid=document.getElementById('grid');
  grid.innerHTML='';
  grid.style.gridTemplateColumns=`repeat(${cols},1fr)`;
  grid.style.gridTemplateRows='repeat(2,1fr)';

  cellSettings.forEach((s,idx)=>{
    const key=`cell-${idx}`;
    const pair=ALL_PAIRS.find(p=>p.id===s.pairId)||ALL_PAIRS[0];
    const opts=ALL_PAIRS.map(p=>`<option value="${p.id}"${p.id===s.pairId?' selected':''}>${p.label}</option>`).join('');
    const rl=s.range<12?`${s.range}M`:`${Math.round(s.range/12)}Y`;
    const cl=s.candle<=1?'Daily':s.candle<=7?'Weekly':'Monthly';
    const cell=document.createElement('div');
    cell.className='cell';
    cell.innerHTML=`
      <div class="cell-top">
        <div>
          <div class="pair-name" id="name-${key}">${pair.label}</div>
          <div class="pair-sub"  id="sub-${key}">${rl} · ${cl}</div>
        </div>
        <div class="pblock">
          <div class="price" id="price-${key}">—</div>
          <div class="chg"   id="chg-${key}">—</div>
        </div>
      </div>
      <div class="cwrap">
        <canvas id="cv-${key}"></canvas>
        <div class="chart-btns">
          <button class="reset-btn" id="reset-${key}" data-idx="${idx}" title="Reset zoom">↺ Reset</button>
          <button class="ma-btn" data-idx="${idx}" data-ma="100">MA100</button>
          <button class="ma-btn" data-idx="${idx}" data-ma="200">MA200</button>
        </div>
        <div class="overlay" id="ov-${key}"><div class="spin"></div><div class="ov-lbl">Loading…</div></div>
      </div>
      <div class="cell-controls">
        <select class="cell-sel" data-idx="${idx}" data-type="pair">${opts}</select>
        <div class="cell-sep"></div>
        <button class="cell-btn${s.range===1?' active':''}"  data-idx="${idx}" data-type="range" data-val="1">1M</button>
        <button class="cell-btn${s.range===3?' active':''}"  data-idx="${idx}" data-type="range" data-val="3">3M</button>
        <button class="cell-btn${s.range===6?' active':''}"  data-idx="${idx}" data-type="range" data-val="6">6M</button>
        <button class="cell-btn${s.range===36?' active':''}" data-idx="${idx}" data-type="range" data-val="36">3Y</button>
        <button class="cell-btn${s.range===60?' active':''}" data-idx="${idx}" data-type="range" data-val="60">5Y</button>
        <div class="cell-sep"></div>
        <button class="cell-btn${s.candle===1?' active':''}"  data-idx="${idx}" data-type="candle" data-val="1">D</button>
        <button class="cell-btn${s.candle===7?' active':''}"  data-idx="${idx}" data-type="candle" data-val="7">W</button>
        <button class="cell-btn${s.candle===30?' active':''}" data-idx="${idx}" data-type="candle" data-val="30">M</button>
      </div>`;
    grid.appendChild(cell);
  });

  cellSettings.forEach((_,idx)=>renderCell(idx));
}

// ── Events ────────────────────────────────────────────────────────────────────
document.getElementById('grid').addEventListener('change',e=>{
  if(!e.target.matches('.cell-sel[data-type="pair"]'))return;
  const idx=+e.target.dataset.idx,key=`cell-${idx}`;
  cellSettings[idx].pairId=e.target.value;
  destroyChart(key);
  const rb=document.getElementById(`reset-${key}`);if(rb)rb.classList.remove('visible');
  if(!rawData[e.target.value])fetchPair(e.target.value).then(()=>renderCell(idx));
  else renderCell(idx);
});

document.getElementById('grid').addEventListener('click',e=>{
  const rb=e.target.closest('.reset-btn');
  if(rb){
    const idx=+rb.dataset.idx,key=`cell-${idx}`;
    if(charts[key])charts[key].resetZoom();
    rb.classList.remove('visible');return;
  }
  const maBtn=e.target.closest('.ma-btn');
  if(maBtn){
    const idx=+maBtn.dataset.idx,ma=+maBtn.dataset.ma,key=`cell-${idx}`;
    if(ma===100){cellSettings[idx].ma100=!cellSettings[idx].ma100;maBtn.classList.toggle('active-100',cellSettings[idx].ma100);}
    else{cellSettings[idx].ma200=!cellSettings[idx].ma200;maBtn.classList.toggle('active-200',cellSettings[idx].ma200);}
    destroyChart(key);renderCell(idx);return;
  }
  const btn=e.target.closest('.cell-btn');if(!btn)return;
  const idx=+btn.dataset.idx,type=btn.dataset.type,val=+btn.dataset.val,key=`cell-${idx}`;
  btn.closest('.cell-controls').querySelectorAll(`.cell-btn[data-type="${type}"]`).forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(type==='range') cellSettings[idx].range=val;
  if(type==='candle'){cellSettings[idx].candle=val;destroyChart(key);}
  const rb2=document.getElementById(`reset-${key}`);if(rb2)rb2.classList.remove('visible');
  renderCell(idx);
});

document.getElementById('grid-size-btns').addEventListener('click',e=>{
  const btn=e.target.closest('.btn');if(!btn)return;
  document.querySelectorAll('#grid-size-btns .btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');gridCols=+btn.dataset.size;buildGrid(gridCols);
});

// ── Fetch ─────────────────────────────────────────────────────────────────────
async function fetchPair(pairId){
  try{
    const r=await fetch(`data/${pairId}.json?t=${Date.now()}`);
    if(!r.ok)throw new Error(`HTTP ${r.status}`);
    const json=await r.json();
    if(!json.chart)throw new Error('No data yet — run GitHub Actions first');
    rawData[pairId]=parseYahoo(json);
  }catch(e){console.error(pairId,e);}
}

async function fetchAll(){
  await Promise.allSettled(ALL_PAIRS.map(p=>fetchPair(p.id)));
  let latest=null;
  ALL_PAIRS.forEach(p=>{const d=rawData[p.id];if(d?.length){const ld=new Date(d[d.length-1].ts);if(!latest||ld>latest)latest=ld;}});
  if(latest)document.getElementById('data-ts').textContent=`Yahoo Finance · Last data: ${latest.toLocaleDateString('da-DK',{day:'2-digit',month:'short',year:'numeric'})}`;
  cellSettings.forEach((_,idx)=>renderCell(idx));
}

setInterval(()=>{
  document.getElementById('clock').textContent=new Date().toLocaleTimeString('da-DK',{hour12:false});
  countdown--;
  if(countdown<=0){countdown=REFRESH_SEC;fetchAll();}
  const m=Math.floor(countdown/60),s=String(countdown%60).padStart(2,'0');
  document.getElementById('cd').textContent=`${m}:${s}`;
},1000);

buildGrid(3);
fetchAll();
</script>
</body>
</html>
