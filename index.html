<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arla FX Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');

:root {
  --arla-green:      #40B93C;
  --arla-dark-green: #0A4919;
  --arla-yellow:     #FBC507;
  --arla-white:      #FFFFFF;

  --bg:     #0d1f0f;
  --panel:  #0f2311;
  --panel2: #122814;
  --bdr:    #1a3d1d;
  --text:   #e8f5e9;
  --muted:  #4a7a4e;
  --lbl:    #6aaa6e;

  --up:   #40B93C;
  --down: #e05252;

  --eur-c: #40B93C;
  --usd-c: #FBC507;
  --sek-c: #a3d9a1;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'Nunito', sans-serif; }
body { display: flex; flex-direction: column; }

/* ── HEADER ── */
header {
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 20px;
  background: var(--arla-dark-green);
  border-bottom: 3px solid var(--arla-green);
}

.logo-area { display: flex; align-items: center; gap: 14px; }

/* Arla logo SVG inline */
.arla-logo svg { height: 38px; width: auto; display: block; }

.header-title {
  font-size: 13px; font-weight: 700; letter-spacing: .08em;
  text-transform: uppercase; color: var(--arla-white);
  border-left: 2px solid var(--arla-green);
  padding-left: 14px; line-height: 1.3;
}
.header-title span { display: block; font-size: 10px; font-weight: 400; color: var(--arla-green); letter-spacing: .12em; }

.hdr-right { display: flex; gap: 20px; align-items: center; }

/* ── CONTROLS BAR ── */
.controls {
  flex-shrink: 0;
  display: flex; align-items: center; gap: 6px;
  padding: 7px 20px;
  background: var(--panel);
  border-bottom: 1px solid var(--bdr);
  flex-wrap: wrap;
}

.ctrl-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--lbl); margin-right: 2px; }
.ctrl-sep { width: 1px; height: 20px; background: var(--bdr); margin: 0 8px; }

.btn-group { display: flex; gap: 3px; }
.btn {
  font-family: 'Nunito', sans-serif;
  font-size: 10px; font-weight: 700;
  padding: 4px 10px; border-radius: 4px; cursor: pointer;
  border: 1px solid var(--bdr); background: var(--panel2); color: var(--lbl);
  letter-spacing: .05em; text-transform: uppercase; transition: all .15s;
}
.btn:hover { border-color: var(--arla-green); color: var(--arla-green); }
.btn.active { background: var(--arla-green); border-color: var(--arla-green); color: var(--arla-dark-green); }

.hdr-clock { font-size: 12px; font-weight: 700; color: var(--arla-yellow); letter-spacing: .08em; }
.live-pill {
  display: flex; align-items: center; gap: 6px;
  font-size: 10px; font-weight: 600; color: var(--lbl);
  background: var(--panel2); border: 1px solid var(--bdr);
  border-radius: 20px; padding: 3px 10px;
}
.live-dot {
  width: 6px; height: 6px; border-radius: 50%; background: var(--arla-green);
  animation: blink 2s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

/* ── GRID ── */
.grid {
  flex: 1; min-height: 0;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  grid-template-rows: repeat(2, 1fr);
  gap: 1px; background: var(--bdr);
}

.cell {
  background: var(--panel); display: flex; flex-direction: column;
  padding: 10px 14px 8px; position: relative; overflow: hidden;
}
.cell::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; }
.eur::after { background: var(--eur-c); }
.usd::after { background: var(--usd-c); }
.sek::after { background: var(--sek-c); }

.cell-top {
  flex-shrink: 0; display: flex; align-items: flex-start;
  justify-content: space-between; margin-bottom: 6px;
}

.pair { font-size: 13px; font-weight: 800; letter-spacing: .06em; }
.eur .pair { color: var(--eur-c); }
.usd .pair { color: var(--usd-c); }
.sek .pair { color: var(--sek-c); }

.tf-badge {
  font-size: 9px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
  color: var(--lbl); margin-top: 3px; border: 1px solid var(--bdr);
  border-radius: 3px; padding: 2px 6px; display: inline-block;
}

.pblock { text-align: right; }
.price { font-size: 16px; font-weight: 800; letter-spacing: .02em; }
.chg { font-size: 10px; font-weight: 600; margin-top: 2px; }
.chg.up   { color: var(--up);   }
.chg.down { color: var(--down); }
.chg.neu  { color: var(--muted); }

.cwrap { flex: 1; min-height: 0; position: relative; }
.cwrap canvas { width: 100% !important; height: 100% !important; display: block; }

.overlay {
  position: absolute; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: rgba(13,31,15,.92); font-size: 11px; color: var(--lbl);
  gap: 8px; padding: 12px; text-align: center;
}
.overlay.gone { display: none; }
.spin {
  width: 22px; height: 22px; border: 2px solid var(--bdr);
  border-top-color: var(--arla-green); border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.err-txt { font-size: 9px; color: var(--down); max-width: 180px; line-height: 1.6; }

/* ── FOOTER ── */
footer {
  flex-shrink: 0; display: flex; align-items: center; justify-content: space-between;
  padding: 6px 20px; background: var(--arla-dark-green);
  border-top: 2px solid var(--arla-green); font-size: 10px; color: var(--arla-green);
}
.leg { display: flex; gap: 14px; }
.leg span { display: flex; align-items: center; gap: 5px; font-weight: 600; }
.lb { width: 9px; height: 9px; border-radius: 2px; }
.lb.up   { background: var(--up);   }
.lb.down { background: var(--down); }
</style>
</head>
<body>

<!-- ── HEADER ─────────────────────────────────────────────────────────────── -->
<header>
  <div class="logo-area">
    <div class="arla-logo">
      <!-- Arla Foods logo recreated as SVG from brand assets -->
      <svg viewBox="0 0 120 44" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Cow/leaf icon -->
        <ellipse cx="22" cy="22" rx="20" ry="20" fill="#40B93C"/>
        <ellipse cx="22" cy="22" rx="14" ry="14" fill="#0A4919"/>
        <!-- Stylised cow head -->
        <path d="M14 18 Q16 12 22 13 Q28 12 30 18 Q30 26 22 28 Q14 26 14 18Z" fill="#FFFFFF"/>
        <circle cx="19" cy="19" r="2" fill="#0A4919"/>
        <circle cx="25" cy="19" r="2" fill="#0A4919"/>
        <path d="M19.5 23 Q22 25 24.5 23" stroke="#0A4919" stroke-width="1.2" stroke-linecap="round" fill="none"/>
        <!-- Horns -->
        <path d="M17 16 Q13 10 15 9 Q17 11 17 16" fill="#FBC507"/>
        <path d="M27 16 Q31 10 29 9 Q27 11 27 16" fill="#FBC507"/>
        <!-- Ears -->
        <ellipse cx="13" cy="19" rx="3" ry="2" fill="#FFFFFF"/>
        <ellipse cx="31" cy="19" rx="3" ry="2" fill="#FFFFFF"/>
        <!-- ARLA text -->
        <text x="48" y="20" font-family="Nunito, sans-serif" font-weight="900" font-size="16" fill="#FFFFFF" letter-spacing="2">ARLA</text>
        <text x="48" y="33" font-family="Nunito, sans-serif" font-weight="400" font-size="8" fill="#40B93C" letter-spacing="1.5">FOODS</text>
      </svg>
    </div>
    <div class="header-title">
      FX Rate Monitor
      <span>DKK Cross Rates</span>
    </div>
  </div>
  <div class="hdr-right">
    <div class="live-pill">
      <div class="live-dot"></div>
      <span id="cd">10:00</span>
    </div>
    <div class="hdr-clock" id="clock">--:--:--</div>
  </div>
</header>

<!-- ── CONTROLS ───────────────────────────────────────────────────────────── -->
<div class="controls">
  <span class="ctrl-label">Top graph range</span>
  <div class="btn-group" id="range-top">
    <button class="btn" data-months="1">1M</button>
    <button class="btn" data-months="3">3M</button>
    <button class="btn" data-months="6">6M</button>
    <button class="btn active" data-months="36">3Y</button>
    <button class="btn" data-months="60">5Y</button>
  </div>

  <div class="ctrl-sep"></div>

  <span class="ctrl-label">Bottom graph range</span>
  <div class="btn-group" id="range-bot">
    <button class="btn" data-months="1">1M</button>
    <button class="btn active" data-months="3">3M</button>
    <button class="btn" data-months="6">6M</button>
    <button class="btn" data-months="36">3Y</button>
    <button class="btn" data-months="60">5Y</button>
  </div>

  <div class="ctrl-sep"></div>

  <span class="ctrl-label">Candle size</span>
  <div class="btn-group" id="candle-size">
    <button class="btn" data-candle="1">Daily</button>
    <button class="btn active" data-candle="7">Weekly</button>
    <button class="btn" data-candle="30">Monthly</button>
  </div>
</div>

<!-- ── GRID ───────────────────────────────────────────────────────────────── -->
<div class="grid" id="grid"></div>

<!-- ── FOOTER ─────────────────────────────────────────────────────────────── -->
<footer>
  <div class="leg">
    <span><div class="lb up"></div>Bullish (Close ≥ Open)</span>
    <span><div class="lb down"></div>Bearish (Close &lt; Open)</span>
  </div>
  <div id="data-ts">Yahoo Finance · Data updated every 10 min</div>
</footer>

<script>
// ── Config ──────────────────────────────────────────────────────────────────
const PAIRS = [
  { id: 'EURDKK', label: 'EUR/DKK', cls: 'eur' },
  { id: 'USDDKK', label: 'USD/DKK', cls: 'usd' },
  { id: 'SEKDKK', label: 'SEK/DKK', cls: 'sek' },
];
const ROWS = ['top', 'bot'];
const REFRESH_SEC = 600;

// ── State ───────────────────────────────────────────────────────────────────
let settings = { topMonths: 36, botMonths: 3, candleDays: 7 };
const charts = {};
const rawData = {};   // pair id → parsed daily array
let countdown = REFRESH_SEC;

// ── Build DOM ────────────────────────────────────────────────────────────────
(function buildGrid() {
  const g = document.getElementById('grid');
  ROWS.forEach(row => {
    PAIRS.forEach(p => {
      const k = `${p.id}-${row}`;
      const c = document.createElement('div');
      c.className = `cell ${p.cls}`;
      c.innerHTML = `
        <div class="cell-top">
          <div>
            <div class="pair">${p.label}</div>
            <div class="tf-badge" id="badge-${k}">—</div>
          </div>
          <div class="pblock">
            <div class="price" id="price-${k}">—</div>
            <div class="chg neu" id="chg-${k}">—</div>
          </div>
        </div>
        <div class="cwrap">
          <canvas id="cv-${k}"></canvas>
          <div class="overlay" id="ov-${k}">
            <div class="spin"></div><span>Loading…</span>
          </div>
        </div>`;
      g.appendChild(c);
    });
  });
})();

// ── Overlay helpers ──────────────────────────────────────────────────────────
function showLoad(k) {
  const o = document.getElementById(`ov-${k}`);
  o.innerHTML = `<div class="spin"></div><span>Loading…</span>`;
  o.classList.remove('gone');
}
function showErr(k, msg) {
  const o = document.getElementById(`ov-${k}`);
  o.innerHTML = `<span style="font-size:18px">⚠️</span><div class="err-txt">${msg}</div>`;
  o.classList.remove('gone');
}
function hideOv(k) { document.getElementById(`ov-${k}`).classList.add('gone'); }

// ── Parse Yahoo JSON → daily OHLC ────────────────────────────────────────────
function parseYahoo(json) {
  const result = json.chart.result[0];
  const ts = result.timestamp;
  const q  = result.indicators.quote[0];
  return ts.map((t, i) => ({
    date: new Date(t * 1000).toISOString().split('T')[0],
    o: q.open[i], h: q.high[i], l: q.low[i], c: q.close[i],
  })).filter(d => d.o != null && d.c != null && d.h != null && d.l != null);
}

// ── Aggregate daily → candles of N days ─────────────────────────────────────
function toCandles(daily, nDays) {
  if (nDays <= 1) {
    return daily.map(d => ({ x: new Date(d.date).getTime(), o: d.o, h: d.h, l: d.l, c: d.c }));
  }
  const buckets = {};
  daily.forEach(d => {
    const ms   = new Date(d.date).getTime();
    const slot = Math.floor(ms / (nDays * 86400000)) * (nDays * 86400000);
    if (!buckets[slot]) buckets[slot] = [];
    buckets[slot].push(d);
  });
  return Object.keys(buckets).sort((a,b) => a-b).map(slot => {
    const days = buckets[slot];
    return {
      x: +slot,
      o: days[0].o,
      h: Math.max(...days.map(d => d.h)),
      l: Math.min(...days.map(d => d.l)),
      c: days[days.length-1].c,
    };
  });
}

// ── Trim to N months ─────────────────────────────────────────────────────────
function trimMonths(candles, months) {
  const cutoff = new Date();
  cutoff.setMonth(cutoff.getMonth() - months);
  return candles.filter(c => c.x >= cutoff.getTime());
}

// ── Candlestick plugin ────────────────────────────────────────────────────────
Chart.register({
  id: 'candles',
  afterDatasetsDraw(chart) {
    const ctx = chart.ctx, ds = chart.data.datasets[0];
    const meta = chart.getDatasetMeta(0), yS = chart.scales.y;
    if (!meta?.data?.length) return;
    ds.data.forEach((d, i) => {
      const bar = meta.data[i]; if (!bar || !d) return;
      const isUp = d.c >= d.o;
      const col  = isUp ? '#40B93C' : '#e05252';
      const x = bar.x;
      const yO = yS.getPixelForValue(d.o), yC = yS.getPixelForValue(d.c);
      const yH = yS.getPixelForValue(d.h), yL = yS.getPixelForValue(d.l);
      const top = Math.min(yO,yC), bot = Math.max(yO,yC);
      const bh = Math.max(bot-top, 1.5), hw = Math.max((bar.width||6)/2, 2);
      ctx.save(); ctx.strokeStyle = col; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(x,yH); ctx.lineTo(x,top);
      ctx.moveTo(x,bot); ctx.lineTo(x,yL); ctx.stroke();
      if (isUp) {
        ctx.strokeRect(x-hw,top,hw*2,bh);
        ctx.globalAlpha=.15; ctx.fillStyle=col; ctx.fillRect(x-hw,top,hw*2,bh);
      } else {
        ctx.fillStyle=col; ctx.fillRect(x-hw,top,hw*2,bh);
      }
      ctx.restore();
    });
  }
});

// ── Draw / update chart ───────────────────────────────────────────────────────
function applyChart(key, candles) {
  const canvas = document.getElementById(`cv-${key}`); if (!canvas) return;
  const minY = Math.min(...candles.map(c=>c.l));
  const maxY = Math.max(...candles.map(c=>c.h));
  const pad  = Math.max((maxY-minY)*0.08, 0.005);

  if (charts[key]) {
    charts[key].data.datasets[0].data = candles;
    charts[key].options.scales.y.min  = minY-pad;
    charts[key].options.scales.y.max  = maxY+pad;
    charts[key].update('none'); return;
  }

  charts[key] = new Chart(canvas.getContext('2d'), {
    type: 'bar',
    data: { datasets: [{ data: candles, backgroundColor:'transparent', borderColor:'transparent', barPercentage:.8, categoryPercentage:1 }] },
    options: {
      responsive:true, maintainAspectRatio:false, animation:false, parsing:false,
      layout: { padding: { top:4, bottom:2, left:0, right:4 } },
      scales: {
        x: {
          type:'time', time:{unit:'month', displayFormats:{month:'MMM yy'}, tooltipFormat:'dd MMM yyyy'},
          grid:{color:'#1a3d1d'}, border:{color:'#1a3d1d'},
          ticks:{color:'#4a7a4e', font:{family:'Nunito',size:9}, maxRotation:0, maxTicksLimit:8}
        },
        y: {
          position:'right', min:minY-pad, max:maxY+pad,
          grid:{color:'#1a3d1d'}, border:{color:'#1a3d1d'},
          ticks:{color:'#4a7a4e', font:{family:'Nunito',size:9}, maxTicksLimit:5, callback:v=>v.toFixed(2)}
        }
      },
      plugins: {
        legend:{display:false},
        tooltip:{
          backgroundColor:'#0f2311', borderColor:'#1a3d1d', borderWidth:1,
          titleColor:'#e8f5e9', bodyColor:'#6aaa6e',
          titleFont:{family:'Nunito',size:11}, bodyFont:{family:'Nunito',size:10},
          callbacks:{ label: ctx => { const d=ctx.raw; return [`O: ${d.o.toFixed(4)}`,`H: ${d.h.toFixed(4)}`,`L: ${d.l.toFixed(4)}`,`C: ${d.c.toFixed(4)}`]; } }
        }
      }
    }
  });
}

// ── Label ────────────────────────────────────────────────────────────────────
function setLabel(key, candles) {
  if (!candles.length) return;
  const last = candles[candles.length-1], prev = candles.length>1 ? candles[candles.length-2] : null;
  document.getElementById(`price-${key}`).textContent = last.c.toFixed(4);
  const el = document.getElementById(`chg-${key}`);
  if (prev) {
    const d = last.c-prev.c, pct = (d/prev.c*100).toFixed(2), s = d>=0?'+':'';
    el.textContent = `${s}${d.toFixed(4)}  (${s}${pct}%)`;
    el.className = `chg ${d>=0?'up':'down'}`;
  }
}

// ── Badge label ───────────────────────────────────────────────────────────────
function candleLabel(days) {
  if (days <= 1) return 'Daily';
  if (days <= 7) return 'Weekly';
  return 'Monthly';
}
function monthLabel(m) {
  if (m < 12) return `${m}M`;
  return `${Math.round(m/12)}Y`;
}

// ── Render all cells from cached raw data ─────────────────────────────────────
function renderAll() {
  ROWS.forEach(row => {
    const months = row === 'top' ? settings.topMonths : settings.botMonths;
    PAIRS.forEach(p => {
      const key = `${p.id}-${row}`;
      const daily = rawData[p.id];
      if (!daily) return;

      try {
        const candles = trimMonths(toCandles(daily, settings.candleDays), months);
        if (!candles.length) throw new Error('No candles in range');
        document.getElementById(`badge-${key}`).textContent = `${monthLabel(months)} · ${candleLabel(settings.candleDays)}`;
        setLabel(key, candles);
        applyChart(key, candles);
        hideOv(key);
      } catch(e) {
        showErr(key, e.message);
      }
    });
  });
}

// ── Fetch fresh data from GitHub Pages ───────────────────────────────────────
async function fetchAll() {
  console.log('[FX] fetch', new Date().toTimeString().slice(0,8));

  // Show spinners only on cells that have no data yet
  ROWS.forEach(row => PAIRS.forEach(p => {
    if (!rawData[p.id]) showLoad(`${p.id}-${row}`);
  }));

  let latestDate = null;

  await Promise.allSettled(PAIRS.map(async p => {
    try {
      const r = await fetch(`data/${p.id}.json?t=${Date.now()}`);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const json = await r.json();
      if (!json.chart) throw new Error('No data yet — waiting for first GitHub Actions run');
      rawData[p.id] = parseYahoo(json);
      const last = rawData[p.id][rawData[p.id].length-1];
      const ld = new Date(last.date);
      if (!latestDate || ld > latestDate) latestDate = ld;
    } catch(e) {
      console.error(p.id, e);
      ROWS.forEach(row => showErr(`${p.id}-${row}`, e.message));
    }
  }));

  if (latestDate) {
    document.getElementById('data-ts').textContent =
      `Yahoo Finance · Last update: ${latestDate.toLocaleDateString('da-DK', {day:'2-digit',month:'short',year:'numeric'})}`;
  }

  renderAll();
}

// ── Controls ──────────────────────────────────────────────────────────────────
function setupControls() {
  document.getElementById('range-top').addEventListener('click', e => {
    const btn = e.target.closest('.btn'); if (!btn) return;
    document.querySelectorAll('#range-top .btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    settings.topMonths = +btn.dataset.months;
    renderAll();
  });

  document.getElementById('range-bot').addEventListener('click', e => {
    const btn = e.target.closest('.btn'); if (!btn) return;
    document.querySelectorAll('#range-bot .btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    settings.botMonths = +btn.dataset.months;
    renderAll();
  });

  document.getElementById('candle-size').addEventListener('click', e => {
    const btn = e.target.closest('.btn'); if (!btn) return;
    document.querySelectorAll('#candle-size .btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    settings.candleDays = +btn.dataset.candle;
    // Destroy charts so they rebuild with new aggregation
    Object.keys(charts).forEach(k => { charts[k].destroy(); delete charts[k]; });
    renderAll();
  });
}

// ── Clock + countdown ─────────────────────────────────────────────────────────
setInterval(() => {
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('da-DK', {hour12:false});
  countdown--;
  if (countdown <= 0) { countdown = REFRESH_SEC; fetchAll(); }
  const m = Math.floor(countdown/60), s = String(countdown%60).padStart(2,'0');
  document.getElementById('cd').textContent = `${m}:${s}`;
}, 1000);

// ── Boot ──────────────────────────────────────────────────────────────────────
setupControls();
fetchAll();
</script>
</body>
</html>
