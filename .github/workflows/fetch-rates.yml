name: Fetch FX Rates

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch all pairs
        run: |
          for PAIR in EURDKK GBPDKK USDDKK SEKDKK AUDDKK CADDKK; do
            curl -s "https://query1.finance.yahoo.com/v8/finance/chart/${PAIR}=X?interval=1d&range=5y" \
              -H "User-Agent: Mozilla/5.0" -o data/${PAIR}.json
            echo "Fetched ${PAIR}"
          done

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "FX update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
